<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПК-Конструктор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="header">
        <h1>🛠 ПК-Конструктор</h1>
        <p>Выбери раздел и собирай компьютер</p>
    </div>

    <!-- Отдельные кнопки для разделов -->
    <div class="nav-buttons">
        <button onclick="showCategory('cpu')">Процессор</button>
        <button onclick="showCategory('motherboard')">🔌 Материнская плата</button>
        <button onclick="showCategory('ram')">Оперативная память</button>
        <button onclick="showCategory('gpu')"> Видеокарта</button>
        <button onclick="showCategory('ssd')"> SSD накопитель</button>
        <button onclick="showCategory('psu')"> Блок питания</button>
        <button onclick="showCategory('case')"> Корпус</button>
    </div>

    <!-- Текущая сборка -->
    <div class="build-summary" id="buildSummary">
        <h2>твоя сборка</h2>
        <div id="componentsList">пока ничего не выбрано</div>
        <div class="total" id="totalPrice">итого: 0 ₽</div>
    </div>

    <!-- Область для товаров и ссылок -->
    <div id="items" class="items-grid"></div>

    <script src="script.js"></script>
</body>
</html>
