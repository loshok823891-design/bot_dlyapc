<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПК-Конструктор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>🛠 ПК-Конструктор</h1>
        <p>простая версия</p>
    </div>

    <!-- простые кнопки -->
    <div class="nav-buttons">
        <button onclick="showCategory('cpu')">процессор</button>
        <button onclick="showCategory('gpu')">видеокарта</button>
        <button onclick="showCategory('ram')">оперативка</button>
        <button onclick="showCategory('motherboard')">материнка</button>
        <button onclick="showCategory('ssd')">ssd</button>
        <button onclick="showCategory('psu')">блок питания</button>
        <button onclick="showCategory('case')">корпус</button>
        
        <button onclick="showReadyBuilds()">готовые сборки</button>
        <button onclick="showVideoGuide()">видео пособие</button>
    </div>

    <!-- текущая сборка -->
    <div class="build-summary" id="buildSummary">
        <h2>твоя сборка</h2>
        <div id="componentsList">пока пусто</div>
        <div class="total" id="totalPrice">итого: 0 ₽</div>
    </div>

    <!-- сюда будут появляться товары -->
    <div id="items" class="items-grid"></div>

    <script src="script.js"></script>
</body>
</html>
