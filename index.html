<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПК-Конструктор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="header">
        <h1> ПК-Конструктор</h1>
        <p>собери свой компьютер</p>
    </div>

    <!-- Навигация -->
    <div class="nav-buttons">
        <button onclick="showCategory('cpu')"> комплектующие</button>
        <button onclick="showReadyBuilds()"> готовые сборки</button>
        <button onclick="showVideoGuide()"> видео пособие</button>
    </div>

    <!-- Текущая сборка -->
    <div class="build-summary" id="buildSummary">
        <h2>твоя сборка</h2>
        <div id="componentsList">пока ничего не выбрано</div>
        <div class="total" id="totalPrice">итого: 0 ₽</div>
    </div>

    <!-- Основная область -->
    <div id="items" class="items-grid"></div>

    <script src="script.js"></script>
</body>
</html>
